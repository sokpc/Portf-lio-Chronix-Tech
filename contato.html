<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato | Orçamentos e Parcerias</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">Dev<span>Front</span></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="portfolio.html">Portfólio</a></li>
                <li><a href="contato.html" class="active">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section class="contato-container">
            <div class="contato-info">
                <h1>Vamos conversar?</h1>
                <p>Tem um projeto em mente ou precisa de uma consultoria técnica? Entre em contato por um dos canais oficiais.</p>
                
                <div class="contato-links">
                    <a href="https://wa.me/55XXXXXXXXXXX" target="_blank" class="btn-whatsapp">Chamar no WhatsApp</a>
                    <p><strong>E-mail:</strong> contato@devfront.com</p>
                    <p><strong>LinkedIn:</strong> /in/nome-do-amigo</p>
                    <p><strong>GitHub:</strong> /usuario-do-amigo</p>
                </div>
            </div>

            <form class="contato-form">
                <div class="form-group">
                    <label>Seu Nome</label>
                    <input type="text" placeholder="Ex: João Silva">
                </div>
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" placeholder="seuemail@exemplo.com">
                </div>
                <div class="form-group">
                    <label>Mensagem</label>
                    <textarea rows="5" placeholder="Descreva brevemente o seu projeto..."></textarea>
                </div>
                <button type="submit" class="btn-primary">Enviar Mensagem</button>
            </form>
        </section>
    </main>

    <footer>

    </footer>

</body>
